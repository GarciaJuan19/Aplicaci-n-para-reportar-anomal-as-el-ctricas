[build]
  publish = "."

# ================================================
# Redirección raíz a login
# ================================================
[[redirects]]
  from = "/"
  to = "/login.html"
  status = 301

# ================================================
# Headers globales
# ================================================
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

# ================================================
# Service Worker — siempre fresco
# ================================================
[[headers]]
  for = "/sw.js"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"

# ================================================
# Manifest
# ================================================
[[headers]]
  for = "/manifest.json"
  [headers.values]
    Cache-Control = "no-cache"
    Content-Type = "application/manifest+json"

# ================================================
# Imágenes — cache largo
# ================================================
[[headers]]
  for = "/img/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# ================================================
# JS y CSS — cache largo
# ================================================
[[headers]]
  for = "/js/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/css/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"